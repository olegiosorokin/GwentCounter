<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Новая страница</title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bad+Script&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- отключить close -->
    <div class="modal" id="modal">
      <div class="modal_overlay"></div>
      <div class="modal_window" id="modal_window"></div>
    </div>
    <!-- ограничить высоту по устройству -->
    <header class="header">
      <div class="info">
        <div class="my_info">
          <p class="my_name">1</p>
          <p class="my_fraction">1</p>
          <p class="sum_power" id="my_power">0</p>
          <div class="round">
            <div class="round_points">Р: 2</div>
            <div class="game_points_win">0</div>
          </div>
        </div>
        <div class="oponent_info">
          <p class="oponent_name">1</p>
          <p class="oponent_fraction">1</p>
          <div class="sum_power">0</div>

          <div class="round">
            <div class="game_points_win">0</div>
            <div class="round_points">Р: 2</div>
          </div>
        </div>
      </div>

      <div>
        <select class="weather">
          <option class="value" value="clear">☀️ Ясно 🌞</option>
          <option class="value" value="frost">🌨️ Мороз ⚔️</option>
          <option class="value" value="fog">🌫️ Мгла 🏹</option>
          <option class="value" value="rain">🌧️ Ливень 🏰</option>
          <option class="value" value="storm">⛈️ Шторм 🏹🏰</option>
        </select>
      </div>
    </header>

    <div class="add_card">
      <button
        class="btn"
        onclick="
          openAllModal();
          openModal('cards');
        "
      >
        Добавить карту
      </button>
    </div>

    <div class="rows">
      <div class="row_area">
        <button class="btn row_btn" onclick="toggleRow('melee')">
          <span class="row_points" id="melee_points">0</span>
          <span class="row_title">⚔️ Ближние ⚔️</span>
        </button>
        <button class="btn horn_btn melee_horn" onclick="toggleHorn('melee')">📣</button>
      </div>
      <div class="cards" id="melee"></div>
      <div class="row_area">
        <button class="btn row_btn" onclick="toggleRow('range')">
          <span class="row_points" id="range_points">0</span>
          <span class="row_title">🏹 Дальние 🏹</span>
        </button>
        <button class="btn horn_btn range_horn" onclick="toggleHorn('range')">📣</button>
      </div>
      <div class="cards" id="range"></div>
      <div class="row_area">
        <button class="btn row_btn" onclick="toggleRow('siege')">
          <span class="row_points" id="siege_points">0</span>
          <span class="row_title">🏰 Осадные 🏰</span>
        </button>
        <button class="btn horn_btn siege_horn" onclick="toggleHorn('siege')">📣</button>
      </div>
      <div class="cards siege" id="siege"></div>
    </div>

    <script src="scripts/cards.js"></script>
    <script src="scripts/templates.js"></script>
    <script src="scripts/main.js"></script>
  </body>
</html>
